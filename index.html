<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bareiss-Montante Calculator</title>
    <link rel="stylesheet" href="style.css">

</head>  
<body>
    <header>
        <h1>Bareiss-Montante Calculator</h1>
        <p>
            Step by step matrix solver using Bareiss-Montante method
        </p>
    </header>
    <main>
        <section>
            <h2>Create matrix</h2>
            <label for="rows">Rows:</label>
            <input type="number" id="rows" min="1" value="3">
            <label for="Columns">Columns:</label>
            <input type="number" id="Columns" min="1" value="4">
            <button id="MatrixButton">Create matrix</button>
        </section>
        <section>
            <h2>Matrix</h2>
            <div id="matrixContainer"></div>
        </section>
        <section>
            <h2>Step by step explanation</h2>
            <div id="stepsContainer"></div>
        </section>

    </main>
    <script scr="script.js"></script>
</body>
</html>
